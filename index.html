<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
        }
        .visual {
            background-image: url(imgs/배경.jpg)
        }
        .inner {
            height:646px;
            width: 1100px;
            margin: 0 auto;
            background-color: 0(15, 63, 21);
            position: relative;
        }
        .visual .title {
            position: relative;
            top: 88px;
            left: -10px;
        }
        .visual .pcup1 {
            position: absolute;
            bottom: 0px;
            right: -47px;
            background-color: 0(0, 38, 8);
        }

        .visual .cup1.text {
            position: absolute;
            top: -30px;
            right: 220px;
        }

        .visual .pcup2 {
            position: absolute;
            bottom: 50px;
            right: 100px;
            background-color: (73, 99, 21);
        }
        .visual .cup2.text {
            position: absolute;
            top: 150px;
            right: 150px;
        }
        .visual .pspoon {
            position: absolute;
            bottom: 0;
            left: 275px;      
        }

        .visual .gugyo {
            width: 300px;
        }

        .visual gugyo-name {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            z-index: 10;
        }

        .visual .지창욱 김신록 이름{
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <section class="visual">
        <div class="inner">
            <div class="title fade-in">
                <img src="imgs/지창욱 김신록.png" alt="">    
            </div>
            <div class="pcup1 fade-in">
                <img src="imgs/전지현.png" alt="" class="cup1.image">
                <img src="imgs/전지현 이름..png" alt="" class="cup1 text">
            </div>
            <div class="pcup2 fade-in">
                <img src="imgs/고수.png" alt="" class="cup2 image">
                <img src="imgs/고수 이름..png" alt="" class="cup2 text">
        </div>
        <div class="pspoon fade-in">
            <img src="imgs/구교환.png" alt="">
            <img scr="imgs/구교환이름.png" alt=""class="gugyo-name">
        </div>
        <div>

        </div>

        </div>
    </div>
</section >
<script>
    const fadeEls = document.querySelectorAll('.visual .fade-in');
    gsap.from(fadeEls, {
        duration: 2,
        scale: .3,
        ease: 'elastic',
        opacity: 0,
        stagger: 0.7,
        repeat: 0
    })
</script>
</body>
</html>
